name: Node dev worker compatibility

on:
  push:
    branches: [master]
  pull_request:

jobs:
  node-worker-reload:
    name: Node ${{ matrix.node }} worker reload
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18.20.4", "20.19.2", "22", "24"]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Node worker module reload
        run: bun test tests/dev-supervisor.test.ts --test-name-pattern "node"
