name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      # Guard 1: tag version must match package version
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION=$(node -p "require('./packages/boronix/package.json').version")
          EXPECTED_TAG="v${PKG_VERSION}"
          echo "Tag:             $TAG"
          echo "Package version: $PKG_VERSION"
          echo "Expected tag:    $EXPECTED_TAG"
          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo "✖ Tag '$TAG' does not match package version 'v${PKG_VERSION}'"
            exit 1
          fi
          echo "✔ Tag matches package version"

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      # Guard 2: release:check + smoke:pack before publish
      - name: Release check
        run: bun run release:check

      - name: Smoke pack
        run: bun run smoke:pack

      # Guard 3: boronix first, create-boronix second (dependency order)
      - name: Publish boronix
        working-directory: packages/boronix
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-boronix
        working-directory: packages/create-boronix
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published packages
        run: |
          sleep 5
          npm view boronix version bin
          npm view create-boronix version bin
